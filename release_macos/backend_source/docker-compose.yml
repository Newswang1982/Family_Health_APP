version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: family_health
      POSTGRES_USER: newswang
      POSTGRES_PASSWORD: familyhealth123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: newswang
      DB_PASSWORD: familyhealth123
      DB_NAME: family_health
      DB_SSLMODE: disable
      JWT_SECRET: change-this-in-production
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
