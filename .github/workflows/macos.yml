name: 编译 macOS 版

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 代码分析（仅错误阻止构建）
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 编译 macOS 版
        run: |
          flutter build macos --release --dart-define=API_BASE_URL=https://api.fhc-ai.com/api/v1

      - name: 打包
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../family-health-macos.zip family_health.app

      - name: 上传 macOS 包
        uses: actions/upload-artifact@v4
        with:
          name: family-health-macos
          path: app/family-health-macos.zip
          retention-days: 90
