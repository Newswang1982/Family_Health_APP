name: 编译 Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 检查 Flutter 版本
        run: flutter --version

      - name: 安装依赖
        run: flutter pub get

      - name: 代码分析
        run: flutter analyze

      - name: 修复 Android Gradle 配置
        run: |
          # 使用兼容的 AGP 和 Gradle 版本
          cd android
          # 确保使用阿里云镜像
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: 编译 Release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://api.fhc-ai.com/api/v1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: family-health-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
