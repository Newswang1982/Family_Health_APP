name: 编译 Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 代码分析
        run: flutter analyze

      - name: 编译 Release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://api.fhc-ai.com/api/v1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: family-health-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
